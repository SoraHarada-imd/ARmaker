<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ぐるぐる加藤先生</title>

    <script src="https://aframe.io/releases/0.9.2/aframe.min.js"></script>
    <script src="https://cdn.rawgit.com/jeromeetienne/AR.js/1.6.2/aframe/build/aframe-ar.js"></script>

    <script>
        window.addEventListener('click', function () {
            const model = document.querySelector('#target-model');
            if (!model) return;

            let direction = model.getAttribute('data-direction') || "1";
            direction = parseInt(direction) * -1; 
            model.setAttribute('data-direction', direction);

            const targetRotation = direction === 1 ? "0 360 0" : "0 -360 0";

            model.setAttribute('animation', 'to', targetRotation);
        });
    </script>
</head>

<body style="margin : 0px; overflow: hidden;">
    <a-scene embedded arjs="debugUIEnabled:false;">
        
        <a-assets>
            <a-asset-item id="my-model" src="img/model.glb"></a-asset-item>
        </a-assets>

        <a-marker preset="hiro">
            <a-entity 
                id="target-model"
                gltf-model="#my-model" 
                scale="5 5 5" 
                position="0 0 0" 
                rotation="0 0 0"
                data-direction="1"
                animation="property: rotation; to: 0 360 0; loop: true; dur: 5000; easing: linear">
            </a-entity>
        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>
</body>

</html>
